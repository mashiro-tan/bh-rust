name: Release

on:
  push:
    tags:
      - 'v*' # Срабатывает при пуше тегов вида v1.0.0

jobs:
  build-assets:
    name: Build Asset for ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: bh-rust
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: bh-rust.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Asset (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/my_project target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Prepare Asset (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/my_project.exe target/${{ matrix.target }}/release/${{ matrix.asset_name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}

  publish-release:
    name: Create GitHub Release
    needs: build-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          generate_release_notes: true # Автоматически соберет список изменений из коммитов
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
