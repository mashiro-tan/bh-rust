# ═══════════════════════════════════════════
# bh-rust — Bandwidth Hero Proxy Config
# ═══════════════════════════════════════════

[server]
# Адрес и порт для прослушивания
host = "0.0.0.0"
port = 8080

[image]
# Ресайзить, если меньшая сторона превышает это значение (0 = выкл)
resize_short_side = 720

# Качество сжатия по умолчанию (1–100), если не передано в запросе
quality = 80

# Конвертировать в JPEG по умолчанию (false = WebP)
default_jpeg = false

# Черно-белый режим по умолчанию
default_bw = false

# Максимальный размер скачиваемого изображения в байтах (0 = без лимита)
# 50 MB:
# max_download_bytes = 52428800
max_download_bytes = 0

# Если сжатая копия больше оригинала — вернуть оригинал без изменений
prefer_original_if_smaller = true

# Максимальный размер по любой из сторон в пикселях (0 = без лимита)
# Изображения вне диапазона [1px, max_image_dimension] передаются как есть
# max_image_dimension = 65535

# Максимальное целевое разрешение по длинной стороне (0 = без лимита)
# Эффективный лимит — min(значение, хард-лимит формата: 16383 WebP / 65535 JPEG)
# При превышении — пересчёт пропорционально, при короткой стороне < 1px — оригинал
# max_target_dimension = 4096

# ═══════════════════════════════════════════
# SOCKS5 прокси (раскомментируй для включения)
# ═══════════════════════════════════════════
# [proxy]
# address = "127.0.0.1:1080"
# username = "user"
# password = "pass"
